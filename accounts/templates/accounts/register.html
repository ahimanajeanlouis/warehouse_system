{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{% static 'accounts/styles.css' %}">

</head>

<body>

<div class="register-container">

    <form method="POST" class="register-form">

        {% csrf_token %}

        <h1>Create Account</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <input type="password"
               name="confirm_password"
               placeholder="Confirm Password"
               required>

        <button type="submit">
            Create Account
        </button>

        <p>
            Already have an account?
            <a href="{% url 'login' %}">
                Login
            </a>
        </p>

    </form>

</div>

</body>
</html>
