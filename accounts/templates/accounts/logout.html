{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Logout</title>

  <link rel="stylesheet" href="{% static 'accounts/styles.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="form-container">

  <div class="form-box">

    <h2>
      <i class="fa-solid fa-right-from-bracket"></i>
      Logout Confirmation
    </h2>

    <p style="text-align:center; margin:15px 0; color:#555;">
      Are you sure you want to logout from Warehouse System?
    </p>

    <form method="POST">
      {% csrf_token %}

      <button type="submit" style="background:#dc2626;">
        Yes, Logout
      </button>
    </form>

    <a href="{% url 'dashboard' %}" style="display:block; text-align:center; margin-top:15px;">
      Cancel
    </a>

  </div>

</div>

</body>
</html>
